<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="icon.png">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Sudoku — Nova Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@600;800&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  :root{
    --bg0:#080E1A;
    --bg1:#0D1B2A;
    --bg2:#152234;
    --bg3:#1E3050;
    --accent:#7C3AED;
    --accent2:#9D5CF6;
    --gold:#F59E0B;
    --goldf:#FCD34D;
    --text:#E8EEF8;
    --text2:#8A9EC0;
    --error:#EF4444;
    --correct:#10B981;
    --note:#60A5FA;
    --cell-border:rgba(124,58,237,0.18);
    --cell-bg:rgba(21,34,52,0.85);
    --cell-sel:rgba(124,58,237,0.28);
    --cell-same:rgba(124,58,237,0.12);
    --cell-hint:rgba(16,185,129,0.15);
    --r:10px;
  }

  html,body{height:100%;background:var(--bg0);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;}

  body{display:flex;flex-direction:column;align-items:center;overflow-y:auto;}

  /* ── SCREENS ── */
  .screen{display:none;flex-direction:column;align-items:center;width:100%;min-height:100vh;padding:20px 16px;}
  .screen.active{display:flex;}

  /* ── HOME ── */
  #home{justify-content:center;gap:0;background:radial-gradient(ellipse at 50% 30%, rgba(124,58,237,0.18) 0%, transparent 70%), var(--bg0);}
  .logo{font-family:'Orbitron',sans-serif;font-size:clamp(36px,10vw,56px);font-weight:800;letter-spacing:2px;
        background:linear-gradient(135deg,#fff 0%,var(--accent2) 50%,var(--gold) 100%);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
  .logo-sub{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:6px;color:var(--text2);margin-bottom:40px;text-transform:uppercase;}

  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;margin-bottom:32px;}
  .mode-btn{background:var(--bg2);border:1.5px solid var(--cell-border);border-radius:var(--r);padding:18px 10px;
            cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text);}
  .mode-btn:hover,.mode-btn:active{background:rgba(124,58,237,0.22);border-color:var(--accent);transform:scale(1.03);}
  .mode-btn .icon{font-size:26px;}
  .mode-btn .name{font-size:13px;font-weight:600;letter-spacing:.5px;}
  .mode-btn .stars{font-size:10px;color:var(--gold);}
  .mode-extreme{grid-column:1/-1;}
  .type-toggle-home{display:flex;background:var(--bg2);border-radius:50px;padding:4px;gap:4px;margin-bottom:0;}
  .type-toggle-home button{border:none;background:transparent;color:var(--text2);padding:10px 28px;border-radius:46px;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
  .type-toggle-home button.active{background:var(--accent);color:#fff;box-shadow:0 0 16px rgba(124,58,237,.5);}
  .home-desc{font-size:12px;color:var(--text2);margin:10px 0 24px;text-align:center;line-height:1.6;}

  /* ── GAME SCREEN ── */
  #game{padding:12px 12px 24px;gap:0;background:radial-gradient(ellipse at 50% 10%, rgba(124,58,237,0.12) 0%, transparent 60%), var(--bg0);}

  .top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px;padding:10px 0 8px;}
  .back-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px;}
  .game-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:600;color:var(--text2);letter-spacing:2px;}
  .timer-box{font-family:'Orbitron',sans-serif;font-size:15px;color:var(--text);background:var(--bg2);
             padding:6px 14px;border-radius:50px;border:1px solid var(--cell-border);}

  .stats-row{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px;margin-bottom:10px;}
  .lives{display:flex;gap:6px;align-items:center;}
  .heart{font-size:20px;transition:all .3s;}
  .heart.lost{filter:grayscale(1);opacity:.35;}
  .difficulty-badge{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);
    background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);padding:4px 12px;border-radius:50px;text-transform:uppercase;}
  .progress-txt{font-size:12px;color:var(--text2);}

  /* ── BOARD ── */
  .board-wrap{width:100%;max-width:420px;position:relative;}
  #board{
    display:grid;grid-template-columns:repeat(9,1fr);
    gap:1px;background:rgba(124,58,237,0.25);
    border:2px solid rgba(124,58,237,0.4);
    border-radius:12px;overflow:hidden;
    box-shadow:0 0 40px rgba(124,58,237,0.15), 0 0 80px rgba(0,0,0,0.5);
    width:100%;aspect-ratio:1;
  }

  .cell{
    background:var(--cell-bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;position:relative;overflow:hidden;
    aspect-ratio:1;transition:background .15s;
    border-right:1px solid rgba(124,58,237,0.08);
    border-bottom:1px solid rgba(124,58,237,0.08);
  }
  /* Box borders */
  .cell[data-c="2"],.cell[data-c="5"]{border-right:2px solid rgba(124,58,237,0.45)!important;}
  .cell[data-r="2"],.cell[data-r="5"]{border-bottom:2px solid rgba(124,58,237,0.45)!important;}

  .cell .num{font-size:clamp(14px,4.2vw,22px);font-weight:700;line-height:1;color:var(--text);transition:color .15s;}
  .cell.given .num{color:#C4D4F0;}
  .cell.user-num .num{color:var(--accent2);}
  .cell.wrong .num{color:var(--error);}
  .cell.correct-flash .num{color:var(--correct);}

  .cell.selected{background:var(--cell-sel);box-shadow:inset 0 0 0 2px var(--accent);}
  .cell.same-num{background:var(--cell-same);}
  .cell.related{background:rgba(124,58,237,0.06);}
  .cell.hint-cell{background:var(--cell-hint);}

  /* Notes grid */
  .notes-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
              width:100%;height:100%;padding:1px;gap:0;}
  .note-item{display:flex;align-items:center;justify-content:center;font-size:clamp(6px,2vw,9px);
             color:var(--note);font-weight:500;line-height:1;}

  /* ── CONTROLS ── */
  .controls{width:100%;max-width:420px;margin-top:12px;display:flex;flex-direction:column;gap:8px;}

  .mode-row{display:flex;gap:8px;justify-content:center;}
  .ctrl-btn{flex:1;max-width:90px;background:var(--bg2);border:1.5px solid var(--cell-border);border-radius:var(--r);
            padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
            font-family:'Inter',sans-serif;color:var(--text2);font-size:11px;font-weight:600;transition:all .2s;border:none;}
  .ctrl-btn:active{transform:scale(.95);}
  .ctrl-btn.active{background:rgba(124,58,237,0.22);color:var(--accent2);border:1.5px solid var(--accent);}
  .ctrl-btn .ci{font-size:20px;}

  .type-toggle{display:flex;background:var(--bg2);border-radius:50px;padding:3px;gap:3px;align-self:center;}
  .type-toggle button{border:none;background:transparent;color:var(--text2);padding:8px 22px;border-radius:46px;
    font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
  .type-toggle button.active{background:var(--accent);color:#fff;box-shadow:0 0 12px rgba(124,58,237,.45);}

  .numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;width:100%;}
  .numpad-letter{grid-template-columns:repeat(9,1fr);}
  .np-btn{background:var(--bg2);border:1.5px solid var(--cell-border);border-radius:8px;
          padding:10px 2px;font-size:clamp(14px,4vw,20px);font-weight:700;color:var(--text);
          cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;text-align:center;
          border:1.5px solid rgba(124,58,237,0.15);}
  .np-btn:active{background:rgba(124,58,237,0.3);transform:scale(.92);}
  .np-btn.done{background:rgba(16,185,129,0.15);color:var(--correct);border-color:rgba(16,185,129,0.3);}

  /* ── OVERLAY ── */
  .overlay{position:fixed;inset:0;background:rgba(8,14,26,.85);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);}
  .overlay.show{display:flex;}
  .dialog{background:var(--bg2);border:1.5px solid rgba(124,58,237,.4);border-radius:20px;padding:36px 28px;
          max-width:320px;width:90%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;
          box-shadow:0 0 60px rgba(124,58,237,.25);}
  .dialog h2{font-family:'Orbitron',sans-serif;font-size:22px;color:var(--text);}
  .dialog p{color:var(--text2);font-size:14px;line-height:1.6;}
  .dialog-btns{display:flex;gap:10px;width:100%;}
  .d-btn{flex:1;padding:13px;border-radius:var(--r);border:none;font-family:'Inter',sans-serif;
         font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
  .d-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 20px rgba(124,58,237,.4);}
  .d-btn.secondary{background:var(--bg3);color:var(--text);}
  .d-btn:active{transform:scale(.96);}
  .win-emoji{font-size:56px;animation:bounce .6s ease infinite alternate;}
  @keyframes bounce{to{transform:translateY(-10px);}}

  /* pulse on error */
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .shake{animation:shake .3s ease;}

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg0);}
  ::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="logo">SUDOKU</div>
  <div class="logo-sub">Nova Edition</div>

  <div class="type-toggle-home">
    <button id="h-num" class="active" onclick="setHomeType('number')">1–9 Numbers</button>
    <button id="h-let" onclick="setHomeType('letter')">A–I Letters</button>
  </div>
  <div class="home-desc" id="home-desc">Fill every row, column, and 3×3 box<br>with the digits 1–9.</div>

  <div class="mode-grid">
    <button class="mode-btn" onclick="startGame('easy')">
      <span class="icon">🌱</span><span class="name">Easy</span><span class="stars">★☆☆☆☆</span>
    </button>
    <button class="mode-btn" onclick="startGame('medium')">
      <span class="icon">🔥</span><span class="name">Medium</span><span class="stars">★★☆☆☆</span>
    </button>
    <button class="mode-btn" onclick="startGame('hard')">
      <span class="icon">💎</span><span class="name">Hard</span><span class="stars">★★★☆☆</span>
    </button>
    <button class="mode-btn" onclick="startGame('expert')">
      <span class="icon">⚡</span><span class="name">Expert</span><span class="stars">★★★★☆</span>
    </button>
    <button class="mode-btn mode-extreme" onclick="startGame('extreme')">
      <span class="icon">💀</span><span class="name">Extreme</span><span class="stars">★★★★★</span>
    </button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="game-title" id="game-title">EASY</div>
    <div class="timer-box" id="timer">00:00</div>
  </div>
  <div class="stats-row">
    <div class="lives" id="lives">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
    </div>
    <div class="difficulty-badge" id="diff-badge">Easy</div>
    <div class="progress-txt" id="prog-txt">0 / 81</div>
  </div>
  <div class="board-wrap">
    <div id="board"></div>
  </div>
  <div class="controls">
    <div class="type-toggle" id="type-toggle">
      <button id="g-num" class="active" onclick="setGameType('number')">Numbers</button>
      <button id="g-let" onclick="setGameType('letter')">Letters</button>
    </div>
    <div class="mode-row">
      <button class="ctrl-btn" id="btn-note" onclick="toggleNote()"><span class="ci">✏️</span>Notes</button>
      <button class="ctrl-btn" id="btn-erase" onclick="erase()"><span class="ci">🗑️</span>Erase</button>
      <button class="ctrl-btn" id="btn-hint" onclick="useHint()"><span class="ci">💡</span>Hint</button>
      <button class="ctrl-btn" id="btn-undo" onclick="undoMove()"><span class="ci">↩️</span>Undo</button>
    </div>
    <div class="numpad" id="numpad"></div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="dialog" id="dialog">
    <div id="dl-icon"></div>
    <h2 id="dl-title"></h2>
    <p id="dl-msg"></p>
    <div class="time-result" id="dl-time" style="font-family:'Orbitron',sans-serif;font-size:18px;color:var(--gold);"></div>
    <div class="dialog-btns" id="dl-btns"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const LETTERS = ['A','B','C','D','E','F','G','H','I'];
const NUMS    = ['1','2','3','4','5','6','7','8','9'];

let gameType    = 'number'; // 'number' | 'letter'
let homeType    = 'number';
let difficulty  = 'easy';
let solution    = [];
let puzzle      = [];
let board       = []; // 81 cells: {value,given,notes:Set,wrong}
let selected    = -1;
let noteMode    = false;
let lives       = 3;
let timerSec    = 0;
let timerInt    = null;
let hints       = 3;
let history     = [];
let filledCount = 0;
let isGameOver  = false;

// Remove counts: how many of each value placed
let valueCounts = {};

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
function setHomeType(t){
  homeType = t;
  document.getElementById('h-num').classList.toggle('active', t==='number');
  document.getElementById('h-let').classList.toggle('active', t==='letter');
  document.getElementById('home-desc').innerHTML = t==='number'
    ? 'Fill every row, column, and 3×3 box<br>with the digits 1–9.'
    : 'Fill every row, column, and 3×3 box<br>with the letters A–I.';
}

function goHome(){
  clearInterval(timerInt);
  document.getElementById('home').classList.add('active');
  document.getElementById('game').classList.remove('active');
  closeOverlay();
}

// ═══════════════════════════════════════════════
// GAME TYPE
// ═══════════════════════════════════════════════
function setGameType(t){
  gameType = t;
  document.getElementById('g-num').classList.toggle('active', t==='number');
  document.getElementById('g-let').classList.toggle('active', t==='letter');
  renderNumpad();
  renderBoard();
}

// ═══════════════════════════════════════════════
// SUDOKU GENERATOR
// ═══════════════════════════════════════════════
function generateSudoku(){
  const grid = Array(81).fill(0);
  solveSudoku(grid, true);
  return grid;
}

function solveSudoku(grid, randomize=false){
  const empty = grid.indexOf(0);
  if(empty===-1) return true;
  const vals = [1,2,3,4,5,6,7,8,9];
  if(randomize) shuffle(vals);
  for(const v of vals){
    if(isValid(grid, empty, v)){
      grid[empty]=v;
      if(solveSudoku(grid, randomize)) return true;
      grid[empty]=0;
    }
  }
  return false;
}

function isValid(grid, idx, v){
  const r=Math.floor(idx/9), c=idx%9;
  for(let i=0;i<9;i++){
    if(grid[r*9+i]===v) return false;
    if(grid[i*9+c]===v) return false;
    const br=3*Math.floor(r/3)+Math.floor(i/3);
    const bc=3*Math.floor(c/3)+(i%3);
    if(grid[br*9+bc]===v) return false;
  }
  return true;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

const CLUES = {easy:46, medium:36, hard:28, expert:24, extreme:20};

function makePuzzle(sol, diff){
  const puz=[...sol];
  const cells=Array.from({length:81},(_,i)=>i);
  shuffle(cells);
  const toRemove=81-CLUES[diff];
  let removed=0;
  for(const idx of cells){
    if(removed>=toRemove) break;
    const backup=puz[idx];
    puz[idx]=0;
    const test=[...puz];
    if(countSolutions(test)===1){ removed++; }
    else{ puz[idx]=backup; }
  }
  return puz;
}

function countSolutions(grid, limit=2){
  const empty=grid.indexOf(0);
  if(empty===-1) return 1;
  let count=0;
  for(let v=1;v<=9;v++){
    if(isValid(grid,empty,v)){
      grid[empty]=v;
      count+=countSolutions(grid,limit);
      grid[empty]=0;
      if(count>=limit) return count;
    }
  }
  return count;
}

// ═══════════════════════════════════════════════
// START GAME
// ═══════════════════════════════════════════════
function startGame(diff){
  difficulty = diff;
  gameType   = homeType;
  selected   = -1;
  noteMode   = false;
  lives      = 3;
  timerSec   = 0;
  hints      = 3;
  history    = [];
  filledCount= 0;
  isGameOver = false;

  solution = generateSudoku();
  puzzle   = makePuzzle(solution, diff);

  // Init board state
  board = puzzle.map((v,i)=>({
    value: v>0 ? String(v) : '',
    given: v>0,
    notes: new Set(),
    wrong: false
  }));

  // Count filled
  filledCount = board.filter(c=>c.given).length;

  // Init value counts
  valueCounts = {};
  const sym = getSymbols();
  sym.forEach(s=>{ valueCounts[s]=0; });
  board.forEach(c=>{
    if(c.given && c.value){
      const sym2 = toDisplay(c.value);
      if(valueCounts[sym2]!==undefined) valueCounts[sym2]++;
    }
  });

  // UI
  document.getElementById('home').classList.remove('active');
  document.getElementById('game').classList.add('active');

  const labels = {easy:'Easy',medium:'Medium',hard:'Hard',expert:'Expert',extreme:'Extreme'};
  document.getElementById('game-title').textContent = labels[diff];
  document.getElementById('diff-badge').textContent = labels[diff];

  // Sync type toggles
  document.getElementById('g-num').classList.toggle('active', gameType==='number');
  document.getElementById('g-let').classList.toggle('active', gameType==='letter');

  updateLives();
  updateProgress();
  renderNumpad();
  renderBoard();
  updateTimer();

  clearInterval(timerInt);
  timerInt = setInterval(()=>{
    timerSec++;
    updateTimer();
  },1000);

  closeOverlay();
}

// ═══════════════════════════════════════════════
// SYMBOLS
// ═══════════════════════════════════════════════
function getSymbols(){ return gameType==='letter' ? LETTERS : NUMS; }

// puzzle stores 1-9; display as A-I if letter mode
function toDisplay(v){
  if(!v) return '';
  if(gameType==='letter'){
    const n=parseInt(v);
    return isNaN(n) ? v : LETTERS[n-1];
  }
  return v;
}
function fromDisplay(s){
  if(gameType==='letter'){
    const i=LETTERS.indexOf(s);
    return i>=0 ? String(i+1) : s;
  }
  return s;
}

// ═══════════════════════════════════════════════
// RENDER BOARD
// ═══════════════════════════════════════════════
function renderBoard(){
  const el = document.getElementById('board');
  if(!el.children.length){
    el.innerHTML='';
    for(let i=0;i<81;i++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.i=i;
      cell.dataset.r=Math.floor(i/9);
      cell.dataset.c=i%9;
      cell.addEventListener('pointerdown',()=>selectCell(i));
      el.appendChild(cell);
    }
  }
  const cells=el.querySelectorAll('.cell');
  const selVal = selected>=0 && board[selected].value ? board[selected].value : null;

  cells.forEach((cell,i)=>{
    const c=board[i];
    // classes
    cell.className='cell';
    if(c.given) cell.classList.add('given');
    else if(c.wrong) cell.classList.add('wrong');
    else if(c.value) cell.classList.add('user-num');
    if(i===selected) cell.classList.add('selected');
    else if(selVal && c.value===selVal && !c.wrong) cell.classList.add('same-num');
    else if(selected>=0 && isRelated(i,selected)) cell.classList.add('related');

    // content
    if(c.notes.size>0 && !c.value){
      let html='<div class="notes-grid">';
      for(let n=1;n<=9;n++){
        const sym=gameType==='letter'?LETTERS[n-1]:String(n);
        const has=c.notes.has(String(n));
        html+=`<div class="note-item">${has?`<span>${sym}</span>`:''}</div>`;
      }
      html+='</div>';
      cell.innerHTML=html;
    } else {
      cell.innerHTML=`<span class="num">${toDisplay(c.value)}</span>`;
    }
  });
}

function isRelated(a,b){
  const ar=Math.floor(a/9),ac=a%9;
  const br=Math.floor(b/9),bc=b%9;
  if(ar===br||ac===bc) return true;
  if(Math.floor(ar/3)===Math.floor(br/3)&&Math.floor(ac/3)===Math.floor(bc/3)) return true;
  return false;
}

// ═══════════════════════════════════════════════
// SELECT CELL
// ═══════════════════════════════════════════════
function selectCell(i){
  if(isGameOver) return;
  selected = (selected===i) ? -1 : i;
  renderBoard();
}

// ═══════════════════════════════════════════════
// NUMPAD
// ═══════════════════════════════════════════════
function renderNumpad(){
  const el = document.getElementById('numpad');
  el.innerHTML='';
  const syms = getSymbols();
  syms.forEach((s,idx)=>{
    const btn=document.createElement('button');
    btn.className='np-btn';
    btn.textContent=s;
    const internalVal=String(idx+1);
    const cnt=valueCounts[s]||0;
    if(cnt>=9) btn.classList.add('done');
    btn.addEventListener('pointerdown',()=>enterValue(internalVal));
    el.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════
// ENTER VALUE
// ═══════════════════════════════════════════════
function enterValue(val){
  if(selected<0||isGameOver) return;
  const c=board[selected];
  if(c.given) return;

  saveHistory();

  if(noteMode){
    if(c.value) return; // can't note over a value
    if(c.notes.has(val)) c.notes.delete(val);
    else c.notes.add(val);
    renderBoard();
    return;
  }

  // Remove old value count
  if(c.value && !c.wrong){
    const sym=toDisplay(c.value);
    if(valueCounts[sym]!==undefined) valueCounts[sym]--;
  }

  c.notes.clear();
  c.wrong=false;

  if(val===c.value){
    // deselect same
    renderBoard();
    return;
  }

  const correct = String(solution[selected]);
  if(val===correct){
    if(!c.value) filledCount++;
    c.value=val;
    c.wrong=false;
    const sym=toDisplay(val);
    if(valueCounts[sym]!==undefined) valueCounts[sym]++;

    // Clear notes in related cells that have this value
    clearRelatedNotes(selected, val);

    updateProgress();
    renderNumpad();
    renderBoard();

    if(filledCount===81) setTimeout(()=>showWin(),200);
  } else {
    c.value=val;
    c.wrong=true;
    lives--;
    updateLives();

    // Shake animation
    const cells=document.querySelectorAll('.cell');
    cells[selected].classList.add('shake');
    setTimeout(()=>{ if(cells[selected]) cells[selected].classList.remove('shake'); },400);

    renderBoard();
    if(lives<=0) setTimeout(()=>showLose(),300);
  }
}

function clearRelatedNotes(idx, val){
  for(let i=0;i<81;i++){
    if(i!==idx && isRelated(i,idx)){
      board[i].notes.delete(val);
    }
  }
}

// ═══════════════════════════════════════════════
// ERASE
// ═══════════════════════════════════════════════
function erase(){
  if(selected<0||isGameOver) return;
  const c=board[selected];
  if(c.given) return;
  saveHistory();
  if(c.value && !c.wrong){
    const sym=toDisplay(c.value);
    if(valueCounts[sym]!==undefined) valueCounts[sym]--;
    filledCount--;
    updateProgress();
  }
  c.value='';
  c.wrong=false;
  c.notes.clear();
  renderNumpad();
  renderBoard();
}

// ═══════════════════════════════════════════════
// NOTE MODE
// ═══════════════════════════════════════════════
function toggleNote(){
  noteMode=!noteMode;
  document.getElementById('btn-note').classList.toggle('active',noteMode);
}

// ═══════════════════════════════════════════════
// HINT
// ═══════════════════════════════════════════════
function useHint(){
  if(isGameOver||hints<=0) return;
  // Find an empty or wrong cell — prefer selected
  let idx=selected;
  if(idx<0||board[idx].given||(board[idx].value&&!board[idx].wrong)){
    // find first empty
    idx=board.findIndex(c=>!c.given&&(!c.value||c.wrong));
  }
  if(idx<0) return;
  saveHistory();
  const c=board[idx];
  const correct=String(solution[idx]);

  // Remove old count if wrong
  if(c.value && c.wrong){}
  else if(c.value){
    const sym=toDisplay(c.value);
    if(valueCounts[sym]!==undefined) valueCounts[sym]--;
  }
  if(!c.value) filledCount++;
  c.value=correct;
  c.wrong=false;
  c.notes.clear();
  c.given=true; // lock hint as given

  const sym=toDisplay(correct);
  if(valueCounts[sym]!==undefined) valueCounts[sym]++;

  // flash
  selected=idx;
  clearRelatedNotes(idx,correct);
  updateProgress();
  renderNumpad();
  renderBoard();

  // highlight hint cell briefly
  const cells=document.querySelectorAll('.cell');
  cells[idx].classList.add('hint-cell');
  setTimeout(()=>{ if(cells[idx]) cells[idx].classList.remove('hint-cell'); },1200);

  hints--;
  document.getElementById('btn-hint').querySelector('.ci').textContent=hints>0?'💡':'🚫';
  if(filledCount===81) setTimeout(()=>showWin(),200);
}

// ═══════════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════════
function saveHistory(){
  history.push(board.map(c=>({
    value:c.value, given:c.given, wrong:c.wrong, notes:new Set(c.notes)
  })));
  if(history.length>50) history.shift();
}

function undoMove(){
  if(!history.length) return;
  const prev=history.pop();
  // Recompute counts
  board=prev;
  recomputeCounts();
  filledCount=board.filter(c=>c.value&&!c.wrong).length;
  updateProgress();
  renderNumpad();
  renderBoard();
}

function recomputeCounts(){
  const sym=getSymbols();
  valueCounts={};
  sym.forEach(s=>{ valueCounts[s]=0; });
  board.forEach(c=>{
    if(c.value&&!c.wrong){
      const s=toDisplay(c.value);
      if(valueCounts[s]!==undefined) valueCounts[s]++;
    }
  });
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function updateTimer(){
  const m=Math.floor(timerSec/60).toString().padStart(2,'0');
  const s=(timerSec%60).toString().padStart(2,'0');
  document.getElementById('timer').textContent=`${m}:${s}`;
}

// ═══════════════════════════════════════════════
// LIVES & PROGRESS
// ═══════════════════════════════════════════════
function updateLives(){
  ['h1','h2','h3'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('lost', i>=lives);
  });
}

function updateProgress(){
  const total=81;
  document.getElementById('prog-txt').textContent=`${filledCount} / ${total}`;
}

// ═══════════════════════════════════════════════
// WIN / LOSE
// ═══════════════════════════════════════════════
function showWin(){
  isGameOver=true;
  clearInterval(timerInt);
  const m=Math.floor(timerSec/60).toString().padStart(2,'0');
  const s=(timerSec%60).toString().padStart(2,'0');
  showOverlay('🏆','Puzzle Solved!',
    `You completed the ${difficulty} puzzle!`,
    `Time: ${m}:${s}`,
    [{label:'Play Again',cls:'primary',fn:()=>startGame(difficulty)},{label:'Home',cls:'secondary',fn:goHome}]
  );
}

function showLose(){
  isGameOver=true;
  clearInterval(timerInt);
  showOverlay('💔','Game Over',
    'You made 3 mistakes. Better luck next time!',
    '',
    [{label:'Try Again',cls:'primary',fn:()=>startGame(difficulty)},{label:'Home',cls:'secondary',fn:goHome}]
  );
}

// ═══════════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════════
function showOverlay(icon,title,msg,timeStr,btns){
  document.getElementById('dl-icon').textContent=icon;
  document.getElementById('dl-title').textContent=title;
  document.getElementById('dl-msg').textContent=msg;
  document.getElementById('dl-time').textContent=timeStr;
  const btnEl=document.getElementById('dl-btns');
  btnEl.innerHTML='';
  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.className=`d-btn ${b.cls}`;
    btn.textContent=b.label;
    btn.addEventListener('click',b.fn);
    btnEl.appendChild(btn);
  });
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
}

// Keyboard support
document.addEventListener('keydown',e=>{
  if(isGameOver) return;
  const sym=getSymbols();
  const key=e.key.toUpperCase();
  if(sym.includes(key)){
    enterValue(fromDisplay(key));
    return;
  }
  if(/^[1-9]$/.test(e.key)){
    enterValue(e.key);
    return;
  }
  if(e.key==='Backspace'||e.key==='Delete'){ erase(); return; }
  if(e.key==='n'||e.key==='N'){ toggleNote(); return; }
  if(selected>=0){
    let ns=selected;
    if(e.key==='ArrowRight') ns=selected%9<8?selected+1:selected;
    if(e.key==='ArrowLeft')  ns=selected%9>0?selected-1:selected;
    if(e.key==='ArrowDown')  ns=selected<72?selected+9:selected;
    if(e.key==='ArrowUp')    ns=selected>=9?selected-9:selected;
    if(ns!==selected){ selected=ns; renderBoard(); }
  }
});
</script>
